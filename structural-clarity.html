  function scrollToInputTop() {
    if (diagnosticInputTop) {
      diagnosticInputTop.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  function setMode(mode) {
    const guided = mode === "guided";
    guidedForm.classList.toggle("hidden", !guided);
    csvForm.classList.toggle("hidden", guided);
    modeGuidedCard.classList.toggle("active", guided);
    modeCsvCard.classList.toggle("active", !guided);
  }

  function setResultsLayout(active) {
    pageGrid.classList.toggle("results-active", active);
  }

  function updateStepUI() {
    stepPanels.forEach(panel => {
      panel.classList.toggle("active", Number(panel.dataset.stepPanel) === currentStep);
    });

    stepPills.forEach((pill, index) => {
      const step = index + 1;
      pill.classList.toggle("active", step === currentStep);
      pill.classList.toggle("done", step < currentStep);
    });
  }

  function validateStep(step) {
    const panel = document.querySelector(`.step-panel[data-step-panel="${step}"]`);
    if (!panel) return true;

    const requiredFields = Array.from(panel.querySelectorAll("[required]"));
    for (const field of requiredFields) {
      if (!field.checkValidity()) {
        field.reportValidity();
        return false;
      }
    }
    return true;
  }

  function goToStep(step, shouldScroll = false) {
    currentStep = Math.max(1, Math.min(5, step));
    updateStepUI();

    if (shouldScroll) {
      const stepper = document.querySelector(".stepper");
      if (stepper) {
        stepper.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }
  }

  function setLoadingState(isLoading) {
    loadingShell.classList.toggle("hidden", !isLoading);
    loadingShell.classList.toggle("active", isLoading);
    errorNote.classList.add("hidden");
    errorNote.textContent = "";
  }

  function clearMessages() {
    loadingShell.classList.add("hidden");
    loadingShell.classList.remove("active");
    errorNote.classList.add("hidden");
    errorNote.textContent = "";
  }

  function setError(message) {
    errorNote.textContent = message;
    errorNote.classList.remove("hidden");
    loadingShell.classList.add("hidden");
    loadingShell.classList.remove("active");
  }

  stepPills.forEach((pill, index) => {
    pill.addEventListener("click", () => {
      const targetStep = index + 1;
      if (targetStep <= currentStep || validateStep(currentStep)) {
        goToStep(targetStep, false);
      }
    });
  });

  nextButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      if (validateStep(currentStep)) goToStep(currentStep + 1, false);
    });
  });

  prevButtons.forEach(btn => {
    btn.addEventListener("click", () => goToStep(currentStep - 1, false));
  });

  function mapToScore(value, mapping) {
    return mapping[value] ?? 50;
  }

  function clampValue(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function formatSeverity(value) {
    return severityLabels[value] || value || "—";
  }

  function getBenchmarkPosition(score, benchmark) {
    if (score > benchmark.healthyMax) return "Above comparable range";
    if (score >= benchmark.moderateMin) return "Within comparable range";
    return "Below comparable range";
  }

  function formatCompactCurrency(value) {
    if (!Number.isFinite(value) || value <= 0) return "$0";
    if (value >= 1000000000) return `$${(value / 1000000000).toFixed(1).replace(/\.0$/, "")}B`;
    if (value >= 1000000) return `$${(value / 1000000).toFixed(1).replace(/\.0$/, "")}M`;
    if (value >= 1000) return `$${Math.round(value / 1000)}K`;
    return `$${Math.round(value)}`;
  }

  function formatCompactHours(value) {
    if (!Number.isFinite(value) || value <= 0) return "0 hrs";
    if (value >= 1000000) return `${(value / 1000000).toFixed(1).replace(/\.0$/, "")}M hrs`;
    if (value >= 1000) return `${Math.round(value / 1000)}k hrs`;
    return `${Math.round(value)} hrs`;
  }

  function formatPercent(value) {
    if (!Number.isFinite(value) || value <= 0) return "0%";
    return `${Math.round(value)}%`;
  }

  function getStatusLine(index) {
    if (index >= 85) return "Structure is supporting execution with relatively limited ambiguity exposure.";
    if (index >= 70) return "Structure is functional, but friction is forming in specific boundary conditions.";
    if (index >= 55) return "Structural ambiguity is materially constraining execution and leadership attention.";
    if (index >= 40) return "Structural clarity is weak enough to create recurring drag, rework, and misalignment.";
    return "Structural ambiguity is now severe enough to threaten coordination, accountability, and execution quality.";
  }

  function buildApiPayloadFromGuided(data) {
    const roleClarityBase = (
      mapToScore(data.ownerDefined, { clear: 92, mixed: 66, unclear: 38 }) * 0.38 +
      mapToScore(data.ownerConsistency, { stable: 90, mixed: 64, unstable: 36 }) * 0.32 +
      mapToScore(data.roleOverlap, { rare: 86, sometimes: 62, often: 34 }) * 0.30
    );

    const decisionRightsBase = (
      mapToScore(data.decisionRights, { clear: 92, mixed: 62, unclear: 32 }) * 0.60 +
      mapToScore(data.escalationPath, { clear: 86, mixed: 58, unclear: 30 }) * 0.40
    );

    const handoffClarityBase = (
      mapToScore(data.handoffAmbiguity, { clear: 88, mixed: 56, unclear: 28 }) * 0.55 +
      mapToScore(data.orphanedWork, { rare: 86, sometimes: 58, often: 24 }) * 0.45
    );

    const accountabilityClarityBase = (
      mapToScore(data.accountabilityDiffusion, { rare: 88, sometimes: 58, often: 26 }) * 0.55 +
      mapToScore(data.conflictFrequency, { rare: 84, sometimes: 56, often: 24 }) * 0.45
    );

    const duplicateApprovalsBase = (
      mapToScore(data.duplicateOwnership, { rare: 18, sometimes: 46, often: 74 }) * 0.55 +
      mapToScore(data.informalInfluence, { rare: 14, sometimes: 44, often: 78 }) * 0.25 +
      mapToScore(data.leaderDependence, { low: 16, moderate: 48, high: 76 }) * 0.20
    );

    const changePenalty = mapToScore(data.changePace, {
      stable: 0,
      moderate: 3,
      high: 6,
      constant: 9
    });

    const scalePenalty = mapToScore(data.scopeSize, {
      small: 0,
      medium: 2,
      large: 4,
      "very-large": 6
    });

    return {
      role_clarity: Math.round(clampValue(roleClarityBase - changePenalty, 0, 100)),
      decision_rights_clarity: Math.round(clampValue(decisionRightsBase - changePenalty, 0, 100)),
      handoff_clarity: Math.round(clampValue(handoffClarityBase - scalePenalty, 0, 100)),
      accountability_clarity: Math.round(clampValue(accountabilityClarityBase - scalePenalty, 0, 100)),
      duplicate_approvals: Math.round(clampValue(duplicateApprovalsBase + changePenalty, 0, 100))
    };
  }

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return null;

    const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
    const rows = lines.slice(1).map(line => line.split(",").map(cell => cell.trim()));

    return rows.map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] ?? ""; });
      return obj;
    });
  }

  function getSignalNarrativeLines(result) {
    const lines = [];
    const signals = result.synthesis_signals || {};

    if (signals.coordination_burden) {
      lines.push(`Coordination burden: ${formatSeverity(signals.coordination_burden)}.`);
    }
    if (signals.decision_friction) {
      lines.push(`Decision friction: ${formatSeverity(signals.decision_friction)}.`);
    }
    if (signals.accountability_blur) {
      lines.push(`Accountability blur: ${formatSeverity(signals.accountability_blur)}.`);
    }
    if (signals.compensatory_dependency) {
      lines.push(`Compensatory dependency: ${formatSeverity(signals.compensatory_dependency)}.`);
    }

    return lines;
  }

  function buildExposureEstimates(contextMeta, apiResponse) {
    const meetingsPerWeek = Number(contextMeta.meetingsPerWeek || 0);
    const peopleAffected = Number(contextMeta.peopleAffected || 0);
    const issuesPerMonth = Number(contextMeta.issuesPerMonth || 0);
    const hourlyCost = Number(contextMeta.hourlyCost || 0);

    const index = Number(apiResponse?.result?.headline?.index || 0);
    const severityFactor = clampValue((100 - index) / 100, 0.12, 0.85);

    const fallbackPeople = contextMeta.scopeSize === "small" ? 6 :
      contextMeta.scopeSize === "medium" ? 24 :
      contextMeta.scopeSize === "large" ? 80 : 180;

    const people = peopleAffected > 0 ? peopleAffected : fallbackPeople;
    const rate = hourlyCost > 0 ? hourlyCost : 85;

    const baseMeetings = meetingsPerWeek > 0 ? meetingsPerWeek : Math.max(1, Math.round((issuesPerMonth || 4) / 2));
    const issues = issuesPerMonth > 0 ? issuesPerMonth : Math.max(4, baseMeetings * 3);

    const meetingHoursAnnual = baseMeetings * 52 * 1.25;
    const issueResolutionHoursAnnual = issues * 12 * 1.15;
    const affectedHoursAnnual = people * (3.5 + (severityFactor * 10.5));
    const annualHours = Math.round((meetingHoursAnnual + issueResolutionHoursAnnual + affectedHoursAnnual) * clampValue(0.72 + severityFactor, 0.78, 1.5));

    const annualCost = Math.round(annualHours * rate);
    const capacityDrag = clampValue((severityFactor * 32) + (people > 0 ? Math.min(10, people / 10) : 0), 6, 38);

    return {
      annualHours,
      annualCost,
      capacityDrag
    };
  }

  function saveForSynthesis(apiResponse, meta = {}) {
    const existing = JSON.parse(localStorage.getItem("monderman_diagnostic_results") || "{}");

    existing.structural_clarity = {
      ...apiResponse,
      meta: {
        completed_at: new Date().toISOString(),
        focus_area: meta.focusArea || "",
        structure_type: meta.structureType || "",
        description: meta.description || "",
        meetings_per_week: meta.meetingsPerWeek || "",
        hourly_cost: meta.hourlyCost || "",
        people_affected: meta.peopleAffected || "",
        issues_per_month: meta.issuesPerMonth || ""
      }
    };

    localStorage.setItem("monderman_diagnostic_results", JSON.stringify(existing));
    localStorage.setItem("monderman_structural_clarity_result", JSON.stringify(existing.structural_clarity));
  }

  async function callStructuralClarityApi(payload) {
    const response = await fetch(`${API_BASE}${STRUCTURAL_CLARITY_API_PATH}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => null);

    if (!response.ok) {
      throw new Error(data?.error || data?.detail || "Structural Clarity API request failed.");
    }

    return data;
  }

  async function callStructuralClarityNarrativeApi(payload) {
    const response = await fetch(`${API_BASE}${STRUCTURAL_CLARITY_NARRATIVE_API_PATH}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => null);

    if (!response.ok) {
      throw new Error(data?.error || data?.detail || "Narrative API request failed.");
    }

    return data;
  }

  async function enrichNarrative(apiResponse, contextMeta = {}) {
    const result = apiResponse.result || {};
    const headline = result.headline || {};
    const readout = result.executive_readout || {};

    const synthesisFlags = [
      `Primary constraint type: ${result.synthesis_signals?.primary_constraint_type || "clarity"}.`,
      `Drag severity: ${formatSeverity(result.synthesis_signals?.drag_severity)}.`,
      ...getSignalNarrativeLines(result)
    ];

    const payload = {
      focus_area: contextMeta.focusArea || "Structural boundary",
      structure_type: contextMeta.structureType || "other",
      index: headline.index || "",
      band: headline.band || "",
      executive_signal: readout.executive_signal || "",
      priority: readout.priority || "",
      tradeoff_note: result.tradeoff_note || "",
      time_money_resources_summary: readout.time_money_resources_summary || "",
      intervention_order: result.intervention_order || [],
      synthesis_flags: synthesisFlags
    };

    const narrativeResponse = await callStructuralClarityNarrativeApi(payload);
    return narrativeResponse.narrative || null;
  }

  function renderResults(apiResponse, contextMeta = {}, narrative = null) {
    const result = apiResponse.result || {};
    const headline = result.headline || {};
    const readout = result.executive_readout || {};
    const risk = result.risk_profile || {};
    const benchmark = BENCHMARKS[contextMeta.structureType] || BENCHMARKS.other;
    const benchmarkPosition = getBenchmarkPosition(headline.index || 0, benchmark);
    const exposure = buildExposureEstimates(contextMeta, apiResponse);
    const statusLine = getStatusLine(Number(headline.index || 0));

    latestNarrative = narrative;
    latestContextMeta = contextMeta;

    resultsEmptyState.classList.add("hidden");
    resultsShell.classList.add("active");
    setResultsLayout(true);

    const executiveSignalText = narrative?.executive_signal || readout.executive_signal || "Readout generated.";
    const leadershipPriorityText = narrative?.leadership_priority || readout.priority || "Readout generated.";
    const tradeoffText = narrative?.tradeoff_note || result.tradeoff_note || "—";
    const tmrText = narrative?.tmr_summary || readout.time_money_resources_summary || "—";
    const pdfSummaryText = narrative?.pdf_summary || executiveSignalText;

    scoreNumber.textContent = headline.index ?? "—";
    scoreBand.textContent = headline.band || "—";
    scoreStatusLine.textContent = statusLine;
    scoreSummary.textContent = executiveSignalText;
    scoreBadge.textContent = contextMeta.focusArea || apiResponse.tool_label || "Structural Clarity";

    benchmarkValue.textContent = benchmarkPosition;
    benchmarkSub.textContent = `${benchmark.label}: ${benchmark.moderateMin}–${benchmark.healthyMax}`;

    timeRiskValue.textContent = formatSeverity(risk.time_risk);
    timeRiskSub.textContent = "Directional exposure";

    moneyRiskValue.textContent = formatSeverity(risk.money_risk);
    moneyRiskSub.textContent = "Directional exposure";

    resourceRiskValue.textContent = formatSeverity(risk.resource_risk);
    resourceRiskSub.textContent = "Directional exposure";

    categoryValue.textContent = benchmark.label;
    categorySub.textContent = "Reference group";

    narrativeInterpretation.textContent = executiveSignalText;
    leadershipImplication.textContent = leadershipPriorityText;
    tradeoffNote.textContent = tradeoffText;
    tmrSummary.textContent = tmrText;

    tmrHoursValue.textContent = `${formatCompactHours(exposure.annualHours)}*`;
    tmrHoursSub.textContent = `Estimated annual hours absorbed across approximately ${Number(contextMeta.peopleAffected || 0) || (contextMeta.scopeSize === "small" ? 6 : contextMeta.scopeSize === "medium" ? 24 : contextMeta.scopeSize === "large" ? 80 : 180)} people.`;

    tmrMoneyValue.textContent = `${formatCompactCurrency(exposure.annualCost)}*`;
    tmrMoneySub.textContent = `Estimated annual cost equivalent using ${contextMeta.hourlyCost ? `$${contextMeta.hourlyCost}/hr` : "a default loaded rate assumption"}.`;

    tmrResourceValue.textContent = `${formatPercent(exposure.capacityDrag)}*`;
    tmrResourceSub.textContent = "Estimated share of productive capacity diverted into clarification, coordination, and structural rework.";

    renderList(recommendations, result.intervention_order || []);

    const signalLines = [
      `Primary constraint type: ${result.synthesis_signals?.primary_constraint_type || "clarity"}.`,
      `Drag severity: ${formatSeverity(result.synthesis_signals?.drag_severity)}.`,
      ...getSignalNarrativeLines(result)
    ];
    renderList(frictionFlags, signalLines);

    reportScoreNumber.textContent = headline.index ?? "—";
    reportScoreBand.textContent = headline.band || "—";
    reportStatusLine.textContent = statusLine;
    reportSummaryCopy.textContent = pdfSummaryText;
    reportBenchmarkValue.textContent = benchmarkPosition;
    reportBenchmarkSub.textContent = `${benchmark.label}: ${benchmark.moderateMin}–${benchmark.healthyMax}`;
    reportTimeRiskValue.textContent = formatSeverity(risk.time_risk);
    reportTimeRiskSub.textContent = "Directional exposure";
    reportMoneyRiskValue.textContent = formatSeverity(risk.money_risk);
    reportMoneyRiskSub.textContent = "Directional exposure";
    reportResourceRiskValue.textContent = formatSeverity(risk.resource_risk);
    reportResourceRiskSub.textContent = "Directional exposure";
    reportCategoryValue.textContent = benchmark.label;
    reportCategorySub.textContent = "Reference group";
    reportNarrativeInterpretation.textContent = executiveSignalText;
    reportLeadershipImplication.textContent = leadershipPriorityText;
    reportTradeoffNote.textContent = tradeoffText;
    reportTmrSummary.textContent = `${tmrText} Estimated exposure: ${formatCompactHours(exposure.annualHours)}*, ${formatCompactCurrency(exposure.annualCost)}*, ${formatPercent(exposure.capacityDrag)}* capacity drag.`;
    reportPageSub.textContent = `${contextMeta.focusArea || "Structural boundary"} · ${benchmark.label} · ${contextMeta.description || "Directional structural clarity readout for leadership review."}`;

    renderList(reportRecommendations, result.intervention_order || []);
    renderList(reportFrictionFlags, signalLines);

    renderCharts(apiResponse);
    saveForSynthesis(apiResponse, contextMeta);

    resultsShell.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function buildPdfDataFromPage() {
    const recommendationItems = Array.from(reportRecommendations.querySelectorAll("li")).map(li => li.textContent.trim()).filter(Boolean);
    const flagItems = Array.from(reportFrictionFlags.querySelectorAll("li")).map(li => li.textContent.trim()).filter(Boolean);

    return {
      title: "Structural Clarity Executive Summary",
      focusArea: latestContextMeta.focusArea || "Structural boundary",
      structureType: reportCategoryValue.textContent || "—",
      summaryLine: reportPageSub.textContent || "",
      index: reportScoreNumber.textContent || "—",
      band: reportScoreBand.textContent || "—",
      benchmark: `${reportBenchmarkValue.textContent || "—"} (${reportBenchmarkSub.textContent || ""})`,
      timeRisk: `${reportTimeRiskValue.textContent || "—"} (${reportTimeRiskSub.textContent || ""})`,
      moneyRisk: `${reportMoneyRiskValue.textContent || "—"} (${reportMoneyRiskSub.textContent || ""})`,
      resourceRisk: `${reportResourceRiskValue.textContent || "—"} (${reportResourceRiskSub.textContent || ""})`,
      executiveSignal: reportNarrativeInterpretation.textContent || "",
      leadershipPriority: reportLeadershipImplication.textContent || "",
      tradeoffNote: reportTradeoffNote.textContent || "",
      tmrSummary: reportTmrSummary.textContent || "",
      recommendations: recommendationItems,
      flags: flagItems,
      footerNote: "Time, money, and resource figures are directional estimates derived from user input and Monderman’s structural diagnostic logic. They are intended as leadership planning indicators, not audited measurements."
    };
  }

  function generateExecutiveSummaryPdf() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      unit: "pt",
      format: "letter"
    });

    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const margin = 54;
    const contentWidth = pageWidth - (margin * 2);

    let y = margin;

    function addPageIfNeeded(extra = 0) {
      if (y + extra > pageHeight - margin) {
        doc.addPage();
        y = margin;
      }
    }

    function addSectionTitle(text) {
      addPageIfNeeded(28);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(11);
      doc.setTextColor(63, 110, 161);
      doc.text(text.toUpperCase(), margin, y);
      y += 18;
    }

    function addBody(text, size = 10.5, leading = 15, bold = false) {
      if (!text) return;
      doc.setFont("helvetica", bold ? "bold" : "normal");
      doc.setFontSize(size);
      doc.setTextColor(21, 32, 43);
      const lines = doc.splitTextToSize(text, contentWidth);
      addPageIfNeeded(lines.length * leading + 4);
      doc.text(lines, margin, y);
      y += (lines.length * leading) + 8;
    }

    function addTwoColMetrics(items) {
      const colGap = 18;
      const colWidth = (contentWidth - colGap) / 2;
      const startX1 = margin;
      const startX2 = margin + colWidth + colGap;
      let localY = y;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.setTextColor(21, 32, 43);

      items.forEach((item, idx) => {
        const x = idx % 2 === 0 ? startX1 : startX2;
        if (idx % 2 === 0 && idx > 0) localY += 42;
        addPageIfNeeded((localY - y) + 42);

        doc.setFont("helvetica", "bold");
        doc.text(item.label, x, localY);

        doc.setFont("helvetica", "normal");
        doc.setTextColor(85, 98, 112);
        const lines = doc.splitTextToSize(item.value, colWidth);
        doc.text(lines, x, localY + 14);
        doc.setTextColor(21, 32, 43);
      });

      y = localY + 56;
    }

    function addBullets(items) {
      items.forEach((item) => {
        const bullet = "•";
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10.5);
        doc.setTextColor(21, 32, 43);

        const bulletWidth = 12;
        const wrapped = doc.splitTextToSize(item, contentWidth - bulletWidth);
        addPageIfNeeded(wrapped.length * 15 + 4);

        doc.text(bullet, margin, y);
        doc.text(wrapped, margin + bulletWidth, y);
        y += (wrapped.length * 15) + 6;
      });
      y += 4;
    }

    const data = buildPdfDataFromPage();

    doc.setFillColor(15, 23, 32);
    doc.rect(0, 0, pageWidth, 104, "F");

    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(245, 247, 250);
    doc.text("MONDERMAN DIAGNOSTIC SUITE", margin, 34);

    doc.setFontSize(22);
    doc.text(data.title, margin, 60);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10.5);
    doc.setTextColor(220, 226, 232);
    const subtitleLines = doc.splitTextToSize(data.summaryLine || `${data.focusArea} · ${data.structureType}`, pageWidth - (margin * 2));
    doc.text(subtitleLines, margin, 80);

    y = 132;

    addSectionTitle("Executive Summary");
    addBody(`${data.focusArea} received a Structural Clarity Index of ${data.index}, placing it in the "${data.band}" band. ${reportSummaryCopy.textContent || ""}`);

    addSectionTitle("At-a-Glance");
    addTwoColMetrics([
      { label: "Index", value: `${data.index} · ${data.band}` },
      { label: "Benchmark", value: data.benchmark },
      { label: "Time Risk", value: data.timeRisk },
      { label: "Money Risk", value: data.moneyRisk },
      { label: "Resource Risk", value: data.resourceRisk },
      { label: "Structure Type", value: data.structureType }
    ]);

    addSectionTitle("Executive Signal");
    addBody(data.executiveSignal);

    addSectionTitle("Leadership Priority");
    addBody(data.leadershipPriority);

    addSectionTitle("Recommended Intervention Order");
    addBullets(data.recommendations);

    addSectionTitle("Trade-Off Note");
    addBody(data.tradeoffNote);

    addSectionTitle("Synthesis-Ready Flags");
    addBullets(data.flags);

    addSectionTitle("Time, Money, and Resources");
    addBody(data.tmrSummary);

    addPageIfNeeded(50);
    doc.setDrawColor(227, 231, 235);
    doc.line(margin, pageHeight - 50, pageWidth - margin, pageHeight - 50);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8.5);
    doc.setTextColor(122, 135, 148);
    const footerLines = doc.splitTextToSize(data.footerNote, contentWidth);
    doc.text(footerLines, margin, pageHeight - 34);

    const safeFocus = (data.focusArea || "structural-clarity").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    const dateStamp = new Date().toISOString().slice(0, 10);
    doc.save(`monderman-structural-clarity-${safeFocus || "summary"}-${dateStamp}.pdf`);
  }

  downloadPdfBtn.addEventListener("click", () => {
    generateExecutiveSummaryPdf();
  });

  guidedForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const privacyAgree = document.getElementById("privacyAgree");
    if (!privacyAgree.checked) {
      alert("Please agree to the privacy notice before proceeding.");
      return;
    }

    for (let step = 1; step <= 5; step++) {
      if (!validateStep(step)) {
        goToStep(step, false);
        return;
      }
    }

    const formData = new FormData(guidedForm);
    const data = Object.fromEntries(formData.entries());
    const payload = buildApiPayloadFromGuided(data);

    setLoadingState(true);

    try {
      const apiResponse = await callStructuralClarityApi(payload);

      let narrative = null;
      try {
        narrative = await enrichNarrative(apiResponse, {
          focusArea: data.focusArea || "Structural Clarity",
          structureType: data.structureType || "other"
        });
      } catch (narrativeError) {
        console.warn("Narrative generation failed; using scoring prose.", narrativeError);
      }

      clearMessages();
      renderResults(apiResponse, {
        focusArea: data.focusArea || "Structural Clarity",
        structureType: data.structureType || "other",
        description: data.description || "",
        meetingsPerWeek: data.meetingsPerWeek || "",
        hourlyCost: data.hourlyCost || "",
        peopleAffected: data.peopleAffected || "",
        issuesPerMonth: data.issuesPerMonth || "",
        scopeSize: data.scopeSize || ""
      }, narrative);
    } catch (error) {
      setError(error.message || "Unable to generate structural clarity readout.");
    }
  });

  csvForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const csvPrivacyAgree = document.getElementById("csvPrivacyAgree");
    if (!csvPrivacyAgree.checked) {
      alert("Please agree to the privacy notice before proceeding.");
      return;
    }

    const fileInput = document.getElementById("csvFile");
    const file = fileInput.files[0];

    if (!file) {
      alert("Please choose a CSV file first.");
      return;
    }

    const text = await file.text();
    const rows = parseCSV(text);

    if (!rows || !rows.length) {
      alert("The CSV could not be parsed. Please use the sample template or the guided diagnostic.");
      return;
    }

    const sample = rows[0] || {};
    const mapped = buildGuidedLikeObjectFromCsvRow(sample);
    const payload = buildApiPayloadFromGuided(mapped);

    setLoadingState(true);

    try {
      const apiResponse = await callStructuralClarityApi(payload);

      let narrative = null;
      try {
        narrative = await enrichNarrative(apiResponse, {
          focusArea: mapped.focusArea || "Uploaded structure",
          structureType: mapped.structureType || "other"
        });
      } catch (narrativeError) {
        console.warn("Narrative generation failed; using scoring prose.", narrativeError);
      }

      clearMessages();
      renderResults(apiResponse, {
        focusArea: mapped.focusArea || "Uploaded structure",
        structureType: mapped.structureType || "other",
        description: mapped.description || "",
        meetingsPerWeek: mapped.meetingsPerWeek || "",
        hourlyCost: mapped.hourlyCost || "",
        peopleAffected: mapped.peopleAffected || "",
        issuesPerMonth: mapped.issuesPerMonth || "",
        scopeSize: mapped.scopeSize || ""
      }, narrative);
    } catch (error) {
      setError(error.message || "Unable to generate structural clarity readout from CSV.");
    }
  });

  setMode("guided");
  setResultsLayout(false);
  goToStep(1, false);
</script>
