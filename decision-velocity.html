<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decision Velocity | Monderman</title>

<link
  rel="icon"
  type="image/svg+xml"
  href='data:image/svg+xml;utf8,
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="10" fill="%230F1720"/>
    <text x="17" y="42" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="%23F5F7FA">M</text>
    <rect x="47" y="36" width="8" height="8" rx="1.2" fill="%233F6EA1"/>
  </svg>'
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* =========================
   FOUNDATION
========================= */
:root {
  --accent:#3F6EA1;
  --accent-dark:#2F5886;
  --bg:#F6F7F8;
  --panel:#FFFFFF;
  --dark:#0F1720;
  --text:#15202B;
  --muted:#6B7280;
  --line:#E3E7EB;
  --shadow:0 10px 28px rgba(0,0,0,0.06);
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at 80% 20%, rgba(63,110,161,0.08), transparent 40%),
    var(--bg);
  color:var(--text);
}

/* =========================
   HEADER
========================= */
.header {
  height:64px;
  background:rgba(15,23,32,0.95);
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 28px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.brand {
  font-weight:700;
  letter-spacing:-0.02em;
}

/* =========================
   STATES
========================= */
.state { display:none; }
.state.active { display:block; }

/* =========================
   ENTRY
========================= */
.entry {
  max-width:1100px;
  margin:60px auto;
  padding:0 28px;
}

.hero {
  background:linear-gradient(180deg,#0F1720,#111B25);
  color:#fff;
  padding:50px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.06);
}

.eyebrow {
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  opacity:0.6;
  margin-bottom:14px;
}

.hero h1 {
  font-size:48px;
  margin:0 0 16px;
}

.hero p {
  max-width:600px;
  opacity:0.85;
}

.btn {
  margin-top:20px;
  padding:14px 22px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:500;
}

.btn-primary {
  background:var(--accent);
  color:#fff;
}

/* =========================
   CANVAS
========================= */
.canvas-wrap {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:30px;
}

.column {
  min-width:320px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow);
}

.card h3 {
  margin:0 0 10px;
  font-size:18px;
}

.option {
  border:1px solid var(--line);
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover {
  background:#f0f4f8;
  border-color:var(--accent);
}

.answered {
  opacity:0.6;
}

/* =========================
   INTERSTITIAL
========================= */
.interstitial {
  padding:80px;
  text-align:center;
  background:#0F1720;
  color:#fff;
}

/* =========================
   RESULTS
========================= */
.results {
  max-width:1200px;
  margin:40px auto;
  padding:0 28px;
}

.score {
  background:#0F1720;
  color:#fff;
  padding:30px;
  border-radius:20px;
}

.score h1 {
  font-size:56px;
  margin:0;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:20px;
}

.box {
  background:#fff;
  border:1px solid var(--line);
  padding:16px;
  border-radius:14px;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:900px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">Monderman</div>
</div>

<!-- ENTRY -->
<section id="entryState" class="state active entry">
  <div class="hero">
    <div class="eyebrow">Diagnostic Canvas</div>
    <h1>Decision Velocity</h1>
    <p>
      Diagnose where decisions slow, what structures are responsible,
      and where leadership should intervene.
    </p>
    <button class="btn btn-primary" onclick="start()">Start Diagnostic</button>
  </div>
</section>

<!-- CANVAS -->
<section id="canvasState" class="state">
  <div class="canvas-wrap" id="canvas"></div>
</section>

<!-- INTERSTITIAL -->
<section id="interstitialState" class="state interstitial">
  <h2>Interpreting pathway...</h2>
</section>

<!-- RESULTS -->
<section id="resultsState" class="state results">
  <div class="score">
    <h1 id="score">--</h1>
    <div id="band"></div>
  </div>

  <div class="grid">
    <div class="box" id="benchmark"></div>
    <div class="box" id="exposure"></div>
    <div class="box" id="route"></div>
  </div>

  <div class="grid">
    <div class="box">
      <h3>Executive Interpretation</h3>
      <p id="interpretation"></p>
    </div>

    <div class="box">
      <h3>Leadership Implication</h3>
      <p id="leadership"></p>
    </div>

    <div class="box">
      <h3>Interventions</h3>
      <ul id="actions"></ul>
    </div>
  </div>
</section>

<script>
const API = "https://monderman-api.onrender.com";

/* =========================
   STATE
========================= */
let state = {
  answers:{},
  columns:[]
};

/* =========================
   NODES
========================= */
const nodes = {
  start: {
    q:"What is the most visible issue?",
    options:[
      {label:"Too many approvals", next:"approvals"},
      {label:"Too much coordination", next:"coordination"},
      {label:"Escalations", next:"escalation"}
    ]
  },

  approvals:{
    q:"How many approvals?",
    options:[
      {label:"1–2", val:2},
      {label:"3–5", val:5},
      {label:"6+", val:8}
    ]
  },

  coordination:{
    q:"Meetings per decision?",
    options:[
      {label:"1–2", val:2},
      {label:"3–5", val:5},
      {label:"6+", val:8}
    ]
  },

  escalation:{
    q:"Escalation frequency?",
    options:[
      {label:"Rare", val:1},
      {label:"Sometimes", val:2},
      {label:"Often", val:3}
    ]
  }
};

/* =========================
   FLOW
========================= */
function start(){
  show("canvasState");
  state.columns=[["start"]];
  render();
}

function answer(nodeKey, option){
  state.answers[nodeKey]=option;

  if(option.next){
    state.columns.push([option.next]);
  } else {
    generate();
    return;
  }

  render();
}

/* =========================
   RENDER
========================= */
function render(){
  const canvas = document.getElementById("canvas");
  canvas.innerHTML="";

  state.columns.forEach(col=>{
    const column = document.createElement("div");
    column.className="column";

    col.forEach(key=>{
      const node = nodes[key];

      const card = document.createElement("div");
      card.className="card";

      const q = document.createElement("h3");
      q.innerText=node.q;

      card.appendChild(q);

      node.options.forEach(opt=>{
        const btn = document.createElement("div");
        btn.className="option";
        btn.innerText=opt.label;
        btn.onclick=()=>answer(key,opt);
        card.appendChild(btn);
      });

      column.appendChild(card);
    });

    canvas.appendChild(column);
  });
}

/* =========================
   GENERATE
========================= */
async function generate(){
  show("interstitialState");

  setTimeout(async ()=>{
    try{
      const res = await fetch(API+"/api/decision-velocity-narrative",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({score:52})
      });

      const data = await res.json();

      document.getElementById("score").innerText=52;
      document.getElementById("band").innerText="Significant friction";
      document.getElementById("interpretation").innerText=data.narrative?.executive_interpretation || "";
      document.getElementById("leadership").innerText=data.narrative?.leadership_implication || "";

      const list=document.getElementById("actions");
      list.innerHTML="";
      (data.narrative?.recommended_interventions||[]).forEach(a=>{
        const li=document.createElement("li");
        li.innerText=a;
        list.appendChild(li);
      });

      show("resultsState");

    }catch(e){
      alert("Error generating output");
    }
  },1500);
}

/* =========================
   UTIL
========================= */
function show(id){
  ["entryState","canvasState","interstitialState","resultsState"]
    .forEach(s=>document.getElementById(s).classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
