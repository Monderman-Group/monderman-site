<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Velocity | Monderman</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f6f8;
}

.container {
  padding:40px;
  text-align:center;
}

.board {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:20px;
}

.column {
  min-width:300px;
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.node {
  margin-bottom:15px;
  padding:15px;
  border:1px solid #ddd;
  border-radius:8px;
}

button {
  padding:10px 14px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Decision Velocity Diagnostic</h1>
  <button onclick="start()">Start</button>
</div>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

let state = {
  columns: [],
  data: {}
};

function start() {
  board.innerHTML = "";
  state.columns = [["symptom"]];
  render();
}

const nodes = {
  symptom: {
    question: "What is the main issue?",
    options: [
      { label: "Too many approvals", next: ["approval"] },
      { label: "Too much coordination", next: ["coordination"] }
    ]
  },

  approval: {
    question: "How many approvals?",
    options: [
      { label: "1-3", value: 1 },
      { label: "4+", value: 2 }
    ]
  },

  coordination: {
    question: "How many meetings?",
    options: [
      { label: "Few", value: 1 },
      { label: "Many", value: 2 }
    ]
  }
};

function render() {
  board.innerHTML = "";

  state.columns.forEach((col, i) => {
    const div = document.createElement("div");
    div.className = "column";

    col.forEach(id => {
      div.appendChild(renderNode(id));
    });

    board.appendChild(div);
  });

  board.scrollLeft = board.scrollWidth;
}

function renderNode(id) {
  const node = nodes[id];
  const div = document.createElement("div");
  div.className = "node";

  const q = document.createElement("div");
  q.innerText = node.question;
  div.appendChild(q);

  node.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.label;

    btn.onclick = () => {
      if (opt.next) {
        state.columns.push(opt.next);
      }
      render();
    };

    div.appendChild(btn);
  });

  return div;
}
</script>

</body>
</html>
