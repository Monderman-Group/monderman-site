<html lang="en">
<head>

<link href="https://www.monderman.com/favicon.ico" rel="icon" type="image/x-icon" sizes="any"/>
<link href="https://www.monderman.com/favicon-192.png" rel="icon" type="image/png" sizes="192x192"/>
<link href="https://www.monderman.com/favicon-192.png" rel="apple-touch-icon"/>
  <meta name="robots" content="noindex, nofollow" />
</head>
<body style="font-family: Arial, sans-serif; padding: 40px;">
  <h1>Monderman Auth Test</h1>
  <button id="googleSignInBtn">Sign in with Google</button>
  <pre id="status" style="margin-top:20px; background:#f4f4f4; padding:16px; border-radius:8px;"></pre>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://ptkxrzgmeldalrkfruth.supabase.co";
    const supabaseKey = "sb_publishable_-4d7OaQvErf0mpdwEJhIoQ_skFiVBhz";

    const supabase = createClient(supabaseUrl, supabaseKey);

    const status = document.getElementById("status");
    const btn = document.getElementById("googleSignInBtn");

    btn.addEventListener("click", async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://www.monderman.com/auth-test.html"
        }
      });

      if (error) {
        status.textContent = "Sign-in error: " + error.message;
      }
    });

    const { data, error } = await supabase.auth.getUser();

    if (error) {
      status.textContent = "Auth check error: " + error.message;
    } else if (data?.user) {
      status.textContent = JSON.stringify(data.user, null, 2);
    } else {
      status.textContent = "Not signed in yet.";
    }
  </script>
</body>
</html>
