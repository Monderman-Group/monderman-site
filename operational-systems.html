// ─────────────────────────────────────────────────────────────────────────────
// State + helpers
// ─────────────────────────────────────────────────────────────────────────────
let stopFlag = false;
let allResults = [];
let pdfjsLoaded = false;

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += `[${new Date().toISOString().slice(11, 19)}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

async function waitFor(predicate, opts = {}) {
  const timeout = opts.timeout || 30000;
  const interval = opts.interval || 100;
  const label = opts.label || "condition";
  const start = Date.now();
  while (Date.now() - start < timeout) {
    if (stopFlag) throw new Error("stopped by user");
    try {
      const result = predicate();
      if (result) return result;
    } catch (e) { /* keep polling */ }
    await sleep(interval);
  }
  throw new Error(`waitFor timeout: ${label} (${timeout}ms)`);
}

async function loadPdfJs() {
  if (pdfjsLoaded) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = PDFJS_CDN;
    s.onload = resolve;
    s.onerror = () => reject(new Error("Failed to load pdf.js from CDN"));
    document.head.appendChild(s);
  });
  if (!window.pdfjsLib) throw new Error("pdfjsLib did not initialize");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
  pdfjsLoaded = true;
  log("✓ pdf.js loaded");
}

// ─────────────────────────────────────────────────────────────────────────────
// Iframe driver — drives the operational-systems.html page through its stages.
// All access to the iframe's internals goes through frame.contentWindow and
// frame.contentDocument since we're same-origin.
// ─────────────────────────────────────────────────────────────────────────────
async function loadIframe() {
  const frame = document.getElementById("theFrame");
  return new Promise((resolve, reject) => {
    let resolved = false;
    const onLoad = () => {
      if (resolved) return;
      resolved = true;
      resolve(frame);
    };
    frame.addEventListener("load", onLoad, { once: true });
    frame.src = "/operational-systems.html?_v8c2=" + Date.now();
    setTimeout(() => { if (!resolved) reject(new Error("iframe load timeout")); }, 30000);
  });
}

async function selectLane(frame, lane) {
  const doc = frame.contentDocument;
  await waitFor(() => doc.querySelector(`.lane-btn[data-lane="${lane}"]`),
    { label: `lane button [data-lane=${lane}]`, timeout: 10000 });
  const btn = doc.querySelector(`.lane-btn[data-lane="${lane}"]`);
  btn.click();
  // The site uses selectLane() which transitions to depthStage automatically
  await waitFor(() => doc.getElementById("depthStage")?.classList.contains("active"),
    { label: "depthStage active" });
}

async function selectDepth(frame, depth) {
  const doc = frame.contentDocument;
  await waitFor(() => doc.querySelector(`.depth-card[data-depth="${depth}"]`),
    { label: `depth card [data-depth=${depth}]` });
  doc.querySelector(`.depth-card[data-depth="${depth}"]`).click();
  await waitFor(() => doc.getElementById("introStage")?.classList.contains("active"),
    { label: "introStage active" });
}

async function fillIntroAndBegin(frame, fixture) {
  const doc = frame.contentDocument;

  // Wait for preflight fields to render
  await waitFor(() => doc.querySelector("#preflight_processName, [data-field-id='processName']"),
    { label: "preflight fields rendered", timeout: 8000 }).catch(() => {
      // Some flows may not have processName as a separate preflight field
    });

  // Process name (textarea or input)
  const pnameEl = doc.querySelector("#preflight_processName") ||
                  doc.querySelector("[data-field-id='processName'] input, [data-field-id='processName'] textarea");
  if (pnameEl) {
    pnameEl.focus();
    pnameEl.value = fixture.processName;
    pnameEl.dispatchEvent(new Event("input", { bubbles: true }));
    pnameEl.dispatchEvent(new Event("change", { bubbles: true }));
    pnameEl.blur();
  }

  // Industry (select)
  const indEl = doc.querySelector("#preflight_industry") ||
                doc.querySelector("[data-field-id='industry'] select");
  if (indEl && fixture.industry) {
    indEl.value = fixture.industry;
    indEl.dispatchEvent(new Event("change", { bubbles: true }));
  }

  // People affected (default to a reasonable value)
  const peopleEl = doc.querySelector("#preflight_peopleAffected") ||
                   doc.querySelector("[data-field-id='peopleAffected'] input");
  if (peopleEl && !peopleEl.value) {
    peopleEl.value = "20";
    peopleEl.dispatchEvent(new Event("input", { bubbles: true }));
    peopleEl.dispatchEvent(new Event("change", { bubbles: true }));
  }

  const hourlyEl = doc.querySelector("#preflight_hourlyCost") ||
                   doc.querySelector("[data-field-id='hourlyCost'] input");
  if (hourlyEl && !hourlyEl.value) {
    hourlyEl.value = "120";
    hourlyEl.dispatchEvent(new Event("input", { bubbles: true }));
    hourlyEl.dispatchEvent(new Event("change", { bubbles: true }));
  }

  // Description (textarea, optional)
  const descEl = doc.querySelector("#preflight_description") ||
                 doc.querySelector("[data-field-id='description'] textarea");
  if (descEl && !descEl.value) {
    descEl.value = `v8c.2 automated test for ${fixture.label}`;
    descEl.dispatchEvent(new Event("input", { bubbles: true }));
    descEl.dispatchEvent(new Event("change", { bubbles: true }));
  }

  // Tick consent
  const consent = doc.getElementById("preStartConsent");
  if (!consent) throw new Error("preStartConsent checkbox not found");
  if (!consent.checked) {
    consent.click();
  }

  // Wait for begin button to enable
  const beginBtn = doc.getElementById("beginBtn");
  if (!beginBtn) throw new Error("beginBtn not found");
  await waitFor(() => !beginBtn.disabled,
    { label: "beginBtn enabled", timeout: 5000 });

  beginBtn.click();
  await waitFor(() => doc.getElementById("questionStage")?.classList.contains("active"),
    { label: "questionStage active", timeout: 30000 });
}

async function answerQuestions(frame, fixture) {
  const doc = frame.contentDocument;
  const answers = ANSWERS[fixture.burden] || {};
  const questionStage = doc.getElementById("questionStage");

  let answered = 0;
  const maxQuestions = 50;

  while (answered < maxQuestions) {
    if (stopFlag) throw new Error("stopped by user");

    // Wait for either: a new question to render, or stage to transition away
    await sleep(180);

    // Check if we've left questionStage (questionnaire complete)
    if (!questionStage.classList.contains("active")) {
      log(`  → ${answered} questions answered, stage transitioned`);
      return answered;
    }

    // Find current question id from data attributes or rendered DOM. The
    // page uses state.currentItem internally; we read the id from the
    // questionStep / question structure. The choice buttons live in a
    // `.choices` container that gets rebuilt per question.
    const choicesContainer = questionStage.querySelector(".choices");
    const textareaContainer = questionStage.querySelector("#questionBody textarea");

    if (!choicesContainer && !textareaContainer) {
      // Question may still be rendering — keep polling
      continue;
    }

    // Look for a question id hint in the DOM. The site renders a label
    // questionTitle but not the id directly. We have to look at the page's
    // current state via the question stage's DOM. The choices buttons have
    // a known structure; we find the right answer by trying each known
    // answer key against any `data-` attributes on the choice buttons.
    //
    // Strategy: scan choice buttons for a `data-value` or fallback text.
    // The site sets buttons in renderChoices(). Inspect: btn.dataset.value
    // or btn dataset reference; checking source line 1817-1823 confirms
    // the button has class "choice" and the value is captured via closure.
    // Without access to the closure value, we have to approach this
    // differently — try clicking the button whose visible label text
    // matches one of the human-readable labels in our answer set.

    if (choicesContainer) {
      // First, identify what question we're on by reading the question title +
      // the option labels. Then determine which option to click.
      const qTitle = (questionStage.querySelector("#questionTitle")?.textContent || "").trim();
      const options = Array.from(choicesContainer.querySelectorAll(".choice"));
      if (options.length === 0) continue;

      // Try heuristic match: pick the option whose label matches what we
      // would have answered. Without explicit option values, we fall back
      // to picking the middle option (same as v8b harness fallback).
      const optionLabels = options.map(o => (o.textContent || "").trim().toLowerCase());

      // Try to identify question by title text → known answer
      // Map distinctive title fragments to expected answer label fragments
      const TITLE_KEYWORDS = {
        "what's the most accurate description": fixture.burden === "proc_heavy" ? "process density" :
                                                   fixture.burden === "ctrl_heavy" ? "control" :
                                                   fixture.burden === "report_heavy" ? "reporting" :
                                                   fixture.burden === "upkp_heavy" ? "upkeep" :
                                                   fixture.burden === "light" ? "process density" : null,
        "administrative": fixture.burden === "light" ? "less than 10" :
                          fixture.burden === "upkp_heavy" ? "more than 40" : "25",
      };

      let chosenIndex = Math.floor(options.length / 2);
      for (const [titleFrag, answerFrag] of Object.entries(TITLE_KEYWORDS)) {
        if (qTitle.toLowerCase().includes(titleFrag) && answerFrag) {
          const matchIdx = optionLabels.findIndex(l => l.includes(answerFrag));
          if (matchIdx >= 0) chosenIndex = matchIdx;
          break;
        }
      }

      options[chosenIndex].click();
      answered++;
    } else if (textareaContainer) {
      // Free-text question — fill with a generic non-empty value and click Next
      textareaContainer.value = "Standard description for v8c.2 test run.";
      textareaContainer.dispatchEvent(new Event("input", { bubbles: true }));
      // Find a Next button in the question stage
      const nextBtn = questionStage.querySelector("button.btn-accent, #nextBtn, [data-action='next']");
      if (nextBtn) nextBtn.click();
      answered++;
    }
  }

  return answered;
}

async function fillExperienceLayer(frame, fixture) {
  const doc = frame.contentDocument;
  const exp = EXP_TEXT[fixture.exp] || EXP_TEXT.none;

  // The experience layer textareas get rendered into an experience grid,
  // but where exactly depends on the lane. We scan for any visible textareas
  // post-questionnaire and fill them best-effort. If exp=none, fill nothing
  // and let the run proceed with no experiential layer.
  if (fixture.exp === "none") return;

  // Wait briefly for the experiential layer UI to appear (if it does).
  // The site automatically transitions to processingStage after the last
  // question; experiential capture happens before submitAnswer triggers
  // finalize. Different lanes show different prompt sets.
  await sleep(500);

  const textareas = Array.from(doc.querySelectorAll("textarea"))
    .filter(ta => ta.offsetParent !== null && !ta.id.startsWith("preflight_"));

  if (textareas.length === 0) {
    log("  · no experience textareas rendered; proceeding without exp layer");
    return;
  }

  // Map textareas to fields by order: self, observedOp, observedMgr, observedSL
  const fields = ["self", "observedOperational", "observedManagerial", "observedSeniorLeader"];
  textareas.forEach((ta, i) => {
    const key = fields[i] || fields[0];
    const text = exp[key] || "";
    if (text) {
      ta.value = text;
      ta.dispatchEvent(new Event("input", { bubbles: true }));
      ta.dispatchEvent(new Event("change", { bubbles: true }));
    }
  });
  log(`  · filled ${textareas.length} experience textareas`);
}

async function waitForResults(frame) {
  const doc = frame.contentDocument;
  await waitFor(() => doc.getElementById("resultsStage")?.classList.contains("active"),
    { label: "resultsStage active", timeout: 90000, interval: 250 });
  // Give the results render time to populate
  await sleep(800);
}

async function capturePdfBlob(frame) {
  // Monkey-patch jsPDF.prototype.save inside the iframe to capture the blob
  // instead of triggering the download dialog.
  const win = frame.contentWindow;
  const doc = frame.contentDocument;
  const downloadBtn = doc.getElementById("downloadPdfBtn");
  if (!downloadBtn) throw new Error("#downloadPdfBtn not found in results stage");

  return new Promise((resolve, reject) => {
    let captured = false;
    const timeout = setTimeout(() => {
      if (!captured) reject(new Error("PDF capture timeout (90s)"));
    }, 90000);

    const tryPatch = () => {
      const jsPDF = win.jspdf?.jsPDF || win.jsPDF;
      if (!jsPDF) return false;
      const origSave = jsPDF.prototype.save;
      jsPDF.prototype.save = function (filename) {
        try {
          const blob = this.output("blob");
          captured = true;
          clearTimeout(timeout);
          // Restore original
          jsPDF.prototype.save = origSave;
          resolve({ blob, filename });
        } catch (e) {
          jsPDF.prototype.save = origSave;
          reject(e);
        }
      };
      return true;
    };

    if (!tryPatch()) {
      // jsPDF lazy-loads; the click triggers loadExecutivePdfLibraries() which
      // appends the script tag. Poll for it after click, or patch immediately
      // after the libraries finish loading.
      const pollInterval = setInterval(() => {
        if (captured) { clearInterval(pollInterval); return; }
        if (tryPatch()) {
          clearInterval(pollInterval);
        }
      }, 100);
      setTimeout(() => clearInterval(pollInterval), 60000);
    }

    // Click the download button
    downloadBtn.click();
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// PDF integrity checks. Take the captured blob and run validation.
// ─────────────────────────────────────────────────────────────────────────────

async function parsePdf(blob) {
  await loadPdfJs();
  const arrayBuffer = await blob.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1 });
    const textContent = await page.getTextContent();
    const text = textContent.items.map(it => it.str).join(" ");
    pages.push({
      pageNum: i,
      width: viewport.width,
      height: viewport.height,
      text,
    });
  }
  return { numPages: pdf.numPages, pages, blob };
}

function checkPdfStructure(parsed, fixture) {
  const reasons = [];
  if (parsed.numPages < 5) reasons.push(`only ${parsed.numPages} pages (expected ≥5 for executive summary)`);
  if (parsed.numPages > 15) reasons.push(`${parsed.numPages} pages (unexpectedly long)`);
  // Letter size: 612 × 792 points
  for (const p of parsed.pages) {
    if (Math.abs(p.width - 612) > 5 || Math.abs(p.height - 792) > 5) {
      reasons.push(`page ${p.pageNum}: ${p.width.toFixed(0)}×${p.height.toFixed(0)}pt (expected 612×792 letter)`);
      break;
    }
  }
  if (reasons.length === 0) {
    return { ok: true, severity: "ok", evidence: `${parsed.numPages} pages, all letter size` };
  }
  return { ok: false, severity: "warn", evidence: reasons.join("; ") };
}

function checkPdfTextContent(parsed, fixture) {
  const reasons = [];
  // Each page should have extractable text (no fully-empty pages)
  let emptyPages = 0;
  for (const p of parsed.pages) {
    if (p.text.replace(/\s+/g, "").length < 20) emptyPages++;
  }
  if (emptyPages > 1) {
    reasons.push(`${emptyPages} pages have <20 chars extractable text — possible render failure`);
  }
  const fullText = parsed.pages.map(p => p.text).join(" ").toLowerCase();
  // Cover page must contain process name
  if (!fullText.includes(fixture.processName.toLowerCase())) {
    reasons.push(`process name "${fixture.processName}" not found in PDF text`);
  }
  // Required executive summary headers
  const requiredHeaders = ["operational systems", "executive"];
  for (const h of requiredHeaders) {
    if (!fullText.includes(h)) {
      reasons.push(`missing expected header content: "${h}"`);
    }
  }
  if (reasons.length === 0) {
    return { ok: true, severity: "ok", evidence: `${parsed.pages.reduce((n, p) => n + p.text.length, 0)} chars text extracted` };
  }
  return { ok: false, severity: reasons.length > 1 ? "crit" : "warn", evidence: reasons.join("; ") };
}

function checkPdfPromptLeakage(parsed, fixture) {
  const fullText = parsed.pages.map(p => p.text).join(" ");
  const patterns = [
    { re: /═{10,}/, label: "Unicode separator (═══) from LOCKED FACTS block" },
    { re: /LOCKED DIAGNOSTIC FACTS/i, label: "LOCKED DIAGNOSTIC FACTS header" },
    { re: /CORRECTIVE RE-PROMPT/i, label: "CORRECTIVE RE-PROMPT header" },
    { re: /Required JSON keys:/i, label: "Required JSON keys: scaffold" },
    { re: /Output rules JSON:/i, label: "Output rules JSON: scaffold" },
    { re: /\bforbidden_claims\b/i, label: "forbidden_claims field name" },
    { re: /\bcanonical_descriptor\b/i, label: "canonical_descriptor field name" },
    { re: /\$\{[a-zA-Z_][a-zA-Z0-9_]*\}/, label: "unfilled ${variable}" },
    { re: /\{\{[a-zA-Z_][a-zA-Z0-9_]*\}\}/, label: "unfilled {{variable}}" },
  ];
  const offenders = [];
  for (const { re, label } of patterns) {
    const m = fullText.match(re);
    if (m) {
      const ctx = fullText.slice(Math.max(0, m.index - 50), m.index + m[0].length + 50);
      offenders.push(`${label} — context: …${ctx}…`);
    }
  }
  if (offenders.length === 0) {
    return { ok: true, severity: "ok", evidence: "no scaffold tokens in PDF text" };
  }
  return { ok: false, severity: "crit", evidence: offenders.join("\n") };
}

function checkPdfFixtureExpectations(parsed, fixture) {
  const reasons = [];
  const fullText = parsed.pages.map(p => p.text).join(" ").toLowerCase();
  // Bypass cases should mention bypass / workaround / control risk
  if (fixture.expectQualSignal === "bypass_control_risk") {
    if (!/bypass|workaround|control[\s-]?risk/i.test(fullText)) {
      reasons.push("expected bypass/control-risk language for bypass fixture, not found");
    }
  }
  // Contradictory cases should mention experiential gap
  if (fixture.expectExperientialGap) {
    if (!/(?:experiential|gap|contrast|diverge|described)/i.test(fullText)) {
      reasons.push("expected experiential-gap language for contradictory fixture, not found");
    }
  }
  // Rising trajectory cases
  if (fixture.expectTrajectory === "rising") {
    if (!/(?:rising|creep|increasing|trending up)/i.test(fullText)) {
      reasons.push("expected rising-trajectory language, not found");
    }
  }
  // Expected dominant burden labels appear
  if (fixture.expectedDominant) {
    const found = fixture.expectedDominant.some(d => fullText.includes(d.toLowerCase()));
    if (!found) {
      reasons.push(`expected dominant burden ${JSON.stringify(fixture.expectedDominant)} not found in PDF`);
    }
  }
  if (reasons.length === 0) {
    return { ok: true, severity: "ok", evidence: "fixture-specific expectations met" };
  }
  return { ok: false, severity: "warn", evidence: reasons.join("; ") };
}

function checkPdfBlobSize(blob) {
  const kb = blob.size / 1024;
  const reasons = [];
  if (kb < 100) reasons.push(`PDF only ${kb.toFixed(0)} KB — likely render failure`);
  if (kb > 8000) reasons.push(`PDF ${kb.toFixed(0)} KB — unexpectedly large, image quality may be misconfigured`);
  if (reasons.length === 0) {
    return { ok: true, severity: "ok", evidence: `${kb.toFixed(0)} KB` };
  }
  return { ok: false, severity: "warn", evidence: reasons.join("; ") };
}

// ─────────────────────────────────────────────────────────────────────────────
// Run a single fixture end-to-end
// ─────────────────────────────────────────────────────────────────────────────
async function runFixture(fixture, idx) {
  log(`\n━━ FIXTURE ${idx}: ${fixture.label} ━━`);
  document.getElementById("frame-title").textContent = `iframe — ${fixture.label}`;

  const result = {
    fixture: fixture.label,
    fixture_idx: idx,
    started_at: new Date().toISOString(),
    status: "running",
    error: null,
    qs_answered: 0,
    pdf_filename: null,
    pdf_size_kb: null,
    pdf_pages: null,
    checks: {},
  };

  try {
    log("→ loading iframe…");
    const frame = await loadIframe();
    await sleep(800); // let initial JS settle

    log("→ Step 1: select lane");
    await selectLane(frame, fixture.lane);

    log("→ Step 2: select depth");
    await selectDepth(frame, fixture.depth);

    log("→ Step 3: fill intro + begin");
    await fillIntroAndBegin(frame, fixture);

    log("→ answering questions…");
    const qsAnswered = await answerQuestions(frame, fixture);
    result.qs_answered = qsAnswered;
    log(`  · ${qsAnswered} questions answered`);

    log("→ filling experiential layer…");
    await fillExperienceLayer(frame, fixture);

    log("→ waiting for results render…");
    await waitForResults(frame);
    log("  ✓ results stage active");

    log("→ capturing PDF…");
    const { blob, filename } = await capturePdfBlob(frame);
    result.pdf_filename = filename;
    result.pdf_size_kb = (blob.size / 1024).toFixed(0);
    log(`  ✓ PDF captured: ${filename} (${result.pdf_size_kb} KB)`);

    log("→ parsing PDF…");
    const parsed = await parsePdf(blob);
    result.pdf_pages = parsed.numPages;

    log("→ running integrity checks…");
    result.checks.structure       = checkPdfStructure(parsed, fixture);
    result.checks.text_content    = checkPdfTextContent(parsed, fixture);
    result.checks.prompt_leakage  = checkPdfPromptLeakage(parsed, fixture);
    result.checks.fixture_expects = checkPdfFixtureExpectations(parsed, fixture);
    result.checks.blob_size       = checkPdfBlobSize(blob);

    // Tally
    const checks = Object.values(result.checks);
    const crit = checks.filter(c => c.severity === "crit").length;
    const warn = checks.filter(c => c.severity === "warn").length;
    result.status = crit > 0 ? "fail" : warn > 0 ? "warn" : "pass";
    log(`  → ${result.status.toUpperCase()} — ${crit} crit, ${warn} warn`);
  } catch (e) {
    result.status = "error";
    result.error = e.message;
    log(`  ✗ ERROR: ${e.message}`);
  }

  result.finished_at = new Date().toISOString();
  return result;
}

// ─────────────────────────────────────────────────────────────────────────────
// Suite runner + UI
// ─────────────────────────────────────────────────────────────────────────────
function renderResults() {
  const container = document.getElementById("results");
  container.innerHTML = "";
  for (const r of allResults) {
    const block = document.createElement("div");
    block.className = "fixture-block " + r.status;
    const tag = r.status === "pass" ? '<span class="tag tag-ok">PASS</span>' :
                r.status === "warn" ? '<span class="tag tag-warn">WARN</span>' :
                r.status === "fail" ? '<span class="tag tag-crit">FAIL</span>' :
                '<span class="tag tag-info">ERROR</span>';
    let html = `
      <div class="fixture-header">
        <div>
          <div class="fixture-name">${r.fixture}</div>
          <div class="fixture-meta">
            qs=${r.qs_answered} ·
            ${r.pdf_pages ? r.pdf_pages + ' pages' : 'no PDF'} ·
            ${r.pdf_size_kb ? r.pdf_size_kb + ' KB' : '—'} ${tag}
          </div>
        </div>
      </div>`;
    if (r.error) {
      html += `<div class="evidence">Error: ${escapeHtml(r.error)}</div>`;
    } else if (r.checks) {
      html += '<table class="checks-table"><tbody>';
      for (const [name, c] of Object.entries(r.checks)) {
        const icon = c.ok ? "✓" : "✗";
        const cls = c.ok ? "cp" : (c.severity === "crit" ? "cf" : "cw");
        html += `<tr><td class="${cls}">${icon}</td><td>${name}</td><td>${escapeHtml(String(c.evidence || ''))}</td></tr>`;
      }
      html += '</tbody></table>';
    }
    block.innerHTML = html;
    container.appendChild(block);
  }
}

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function updateSummary() {
  const total = allResults.length;
  const pass = allResults.filter(r => r.status === "pass").length;
  const warn = allResults.filter(r => r.status === "warn").length;
  const fail = allResults.filter(r => r.status === "fail").length;
  const err = allResults.filter(r => r.status === "error").length;
  document.getElementById("sTotal").textContent = total;
  document.getElementById("sPass").textContent = pass;
  document.getElementById("sWarn").textContent = warn;
  document.getElementById("sFail").textContent = fail;
  document.getElementById("sErr").textContent = err;
  document.getElementById("summary").style.display = "flex";
}

async function startSuite() {
  // Same-origin guard
  if (window.location.protocol !== "https:" && window.location.protocol !== "http:") {
    log("✗ must be hosted on http(s), not file://");
    return;
  }

  stopFlag = false;
  allResults = [];
  document.getElementById("runBtn").disabled = true;
  document.getElementById("stopBtn").style.display = "inline-block";
  document.getElementById("saveBtn").style.display = "none";
  document.getElementById("log").textContent = "";
  document.getElementById("results").innerHTML = "";

  const selected = Array.from(document.querySelectorAll(".fixture-controls input:checked"))
    .map(cb => parseInt(cb.dataset.fixture, 10));
  if (selected.length === 0) {
    log("✗ no fixtures selected");
    document.getElementById("runBtn").disabled = false;
    document.getElementById("stopBtn").style.display = "none";
    return;
  }
  log(`Running ${selected.length} fixture(s) — ${selected.join(", ")}`);

  for (const idx of selected) {
    if (stopFlag) { log("\n■ stopped"); break; }
    document.getElementById("statusLine").textContent = `Running fixture ${idx + 1}/${FIXTURES.length}: ${FIXTURES[idx].label}`;
    const result = await runFixture(FIXTURES[idx], idx);
    allResults.push(result);
    renderResults();
    updateSummary();
  }

  document.getElementById("runBtn").disabled = false;
  document.getElementById("stopBtn").style.display = "none";
  document.getElementById("saveBtn").style.display = "inline-block";
  document.getElementById("statusLine").textContent =
    `Done — ${allResults.filter(r => r.status === "pass").length}/${allResults.length} pass`;
  log("\n━━ done ━━");
}

function saveResults() {
  const out = {
    generated: new Date().toISOString(),
    version: "v8c.2-LiveFlow-PDF",
    base_url: window.location.origin,
    total: allResults.length,
    pass: allResults.filter(r => r.status === "pass").length,
    warn: allResults.filter(r => r.status === "warn").length,
    fail: allResults.filter(r => r.status === "fail").length,
    error: allResults.filter(r => r.status === "error").length,
    results: allResults,
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "monderman_test_results_v8c2.json";
  a.click();
}

// Make iframe panel draggable by header
(function() {
  const host = document.getElementById("frame-host");
  const bar = host.querySelector(".frame-bar");
  let dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;
  bar.addEventListener("mousedown", (e) => {
    if (e.target.tagName === "BUTTON") return;
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    const rect = host.getBoundingClientRect();
    ox = rect.left; oy = rect.top;
    e.preventDefault();
  });
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    host.style.left = (ox + e.clientX - sx) + "px";
    host.style.top = (oy + e.clientY - sy) + "px";
    host.style.right = "auto"; host.style.bottom = "auto";
  });
  document.addEventListener("mouseup", () => { dragging = false; });
})();
</script>
